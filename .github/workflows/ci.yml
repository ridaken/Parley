name: CI and Release

on:
  push:
    branches: [main]
  pull_request:

# A newer commit on the same PR or on main supersedes older work. In particular,
# a merge to main cancels any in-flight test, build, or release for the previous
# main commit and starts this run immediately.
concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      # The store package keeps API keys in the OS keychain, which a headless
      # runner doesn't have; this switches it to an in-memory provider for tests.
      PARLEY_KEYRING_MOCK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l ./internal/store ./internal/analysis ./internal/llm ./internal/condense)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./internal/store/... ./internal/analysis/... ./internal/llm/... ./internal/condense/...

      - name: Test (coverage)
        run: go test -cover ./internal/store/... ./internal/analysis/... ./internal/llm/... ./internal/condense/...

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm install is intentional until the existing package.json/package-lock.json
      # drift is resolved; the production build below still typechecks the app.
      - run: npm install --no-audit --no-fund
      - run: npm run build

  installer:
    name: Windows installer
    needs: [go, frontend]
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Ensure C compiler
        run: |
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install mingw -y
          }
          gcc --version

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.109
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install NSIS
        run: |
          choco install nsis -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # The CPU whisper engine + small model are gitignored and large; cache them
      # keyed on the fetch script so they download once, not every run. Nemotron
      # is provisioned only by fresh installs on machines with NVIDIA GPUs.
      - name: Cache whisper engine + model
        id: whisper-cache
        uses: actions/cache@v4
        with:
          path: resources/whisper
          key: whisper-cpu-${{ hashFiles('scripts/setup-whisper.ps1') }}

      - name: Fetch whisper engine + model
        if: steps.whisper-cache.outputs.cache-hit != 'true'
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/setup-whisper.ps1 -Variant cpu

      # Use the highest completed semantic release (not a workflow run number or
      # draft left by a cancelled run), then increment its patch component. The
      # configured app version is the minimum version baseline.
      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          $config = Get-Content build/config.yml -Raw
          if ($config -notmatch '(?m)^\s+version:\s*["'']?([0-9]+\.[0-9]+\.[0-9]+)') {
            throw 'build/config.yml must contain an info.version in major.minor.patch format'
          }

          $baseline = [version]$matches[1]
          $highest = $baseline
          if ($env:EVENT_NAME -eq 'push') {
            $releases = gh release list --limit 1000 --exclude-drafts --json tagName | ConvertFrom-Json
            foreach ($release in $releases) {
              if ($release.tagName -match '^v?([0-9]+\.[0-9]+\.[0-9]+)$') {
                $candidate = [version]$matches[1]
                if ($candidate -gt $highest) { $highest = $candidate }
              }
            }
          }

          # PRs build the baseline version as a packaging gate but never publish.
          # Main increments the latest completed release.
          if ($env:EVENT_NAME -eq 'push') {
            $next = [version]::new($highest.Major, $highest.Minor, $highest.Build + 1)
          } else {
            $next = $baseline
          }
          "number=$next" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$next" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Next release: v$next"

      - name: Build installer
        run: |
          wails3 task windows:package INSTALL_SCOPE=user PRODUCT_VERSION=${{ steps.version.outputs.number }}
          Copy-Item bin/Parley-amd64-installer.exe "bin/Parley-Setup-${{ steps.version.outputs.tag }}.exe" -Force

      # gh creates the release as a draft, uploads the asset, and only then
      # publishes it. This keeps a partially uploaded installer from becoming the
      # latest public release if GitHub cancels the run during this command.
      - name: Publish GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" `
            "bin/Parley-Setup-${{ steps.version.outputs.tag }}.exe#Parley Windows installer" `
            --target "$env:GITHUB_SHA" `
            --title "Parley ${{ steps.version.outputs.number }}" `
            --generate-notes `
            --latest
